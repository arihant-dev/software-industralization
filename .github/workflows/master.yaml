name: Build and Deploy python application to Azure Web App - master

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
    
      - name: Echo a message
        run: |
          echo "Arihant is calling"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Commit Hash
        id: vars
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "Commit Hash: $COMMIT_HASH"
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: iarihant/flask-app:${{ env.COMMIT_HASH }}
    
    outputs:
      commit_hash: ${{ steps.vars.outputs.commit_hash }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH into Azure VM and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/arihant/software-industralization
            COMMIT_HASH=${{ needs.build.outputs.commit_hash }}
            echo "Updating docker-compose.yaml to use the new image..."
            sed -i "s|image: iarihant/flask-app:.*|image: iarihant/flask-app:${COMMIT_HASH}|g" docker-compose.yaml
            echo "Pulling latest Docker image..."
            podman pull docker.io/iarihant/flask-app:${COMMIT_HASH}
            echo "Deploying updated containers..."
            podman-compose up -d